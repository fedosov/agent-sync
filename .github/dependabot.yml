---
version: 2

updates:
  - package-ecosystem: npm
    directory: /platform/apps/agent-sync-desktop/ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "eslint"
        versions:
          - ">=10"
      - dependency-name: "tailwindcss"
        versions:
          - ">=4"

  - package-ecosystem: cargo
    directory: /platform
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
